<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Me & The Kitchen</title>
<meta name="description" content="My favorite place to be — Me & The Kitchen.">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Caveat:wght@500;700&family=Fraunces:ital,opsz,wght@0,9..144,500;0,9..144,600;1,9..144,500;1,9..144,600&family=Lora:ital,wght@0,400;0,500;0,600;1,400&display=swap" rel="stylesheet">
<style>
  :root{
    --paper:#fbf6ee;
    --paper-line:#e3d9c6;
    --ink:#2b2a28;
    --plum:#6e2a3d;
    --plum-dark:#4d1d2b;
    --sage:#6f8b5e;
    --saffron:#e3a73c;
    --blush:#e7a6ae;
    --ring-metal:#c9a94d;
    --shadow: 0 10px 30px rgba(43,42,40,0.12);
  }

  *{box-sizing:border-box;}
  html{scroll-behavior:smooth;}

  body{
    margin:0;
    background:
      repeating-linear-gradient(
        180deg,
        transparent 0px,
        transparent 37px,
        var(--paper-line) 38px
      ),
      var(--paper);
    color:var(--ink);
    font-family:'Lora', serif;
    line-height:1.6;
    min-height:100vh;
  }

  .notebook{
    position:relative;
    max-width:920px;
    margin:0 auto;
    padding:48px 40px 80px 76px;
  }

  .spiral{
    position:absolute;
    top:0;
    left:0;
    bottom:0;
    width:56px;
    display:flex;
    flex-direction:column;
    align-items:center;
    justify-content:flex-start;
    gap:26px;
    padding-top:70px;
    pointer-events:none;
  }
  .spiral span{
    display:block;
    width:26px;
    height:26px;
    border-radius:50%;
    border:5px solid var(--ring-metal);
    background:
      radial-gradient(circle at 35% 30%, rgba(255,255,255,0.6), transparent 40%),
      var(--paper);
    box-shadow: inset 0 0 0 2px var(--paper), 2px 2px 4px rgba(0,0,0,0.15);
  }

  header.masthead{
    text-align:left;
    margin-bottom: 44px;
    position:relative;
  }

  .brand{
    display:flex;
    align-items:center;
    gap:14px;
  }

  .logo-mark{
    flex:0 0 auto;
    width:70px;
    height:70px;
    object-fit:contain;
  }

  h1.site-title{
    font-family:'Caveat', cursive;
    font-weight:700;
    font-size:clamp(3rem, 8vw, 4.6rem);
    color:var(--plum);
    margin:0;
    line-height:0.95;
    letter-spacing:0.5px;
  }

  .tagline{
    font-family:'Fraunces', serif;
    font-style:italic;
    font-weight:500;
    color:var(--ink);
    opacity:0.75;
    font-size:1.05rem;
    margin:10px 0 0 3px;
  }

  .cards{
    display:grid;
    grid-template-columns:repeat(auto-fit, minmax(260px, 1fr));
    gap:32px;
  }

  .card{
    background:#fffdf9;
    border-radius:6px;
    box-shadow:var(--shadow);
    padding:0 0 20px;
    cursor:pointer;
    border:1px solid rgba(43,42,40,0.06);
    text-align:left;
    font:inherit;
    color:inherit;
    position:relative;
    overflow:hidden;
    transition: transform 0.25s ease, box-shadow 0.25s ease;
  }
  .card:hover, .card:focus-visible{
    transform:translateY(-4px) rotate(-0.4deg);
    box-shadow:0 16px 34px rgba(43,42,40,0.18);
  }
  .card:focus-visible{
    outline:3px solid var(--sage);
    outline-offset:3px;
  }

  .tape{
    position:absolute;
    top:-8px;
    left:24px;
    width:70px;
    height:26px;
    background:rgba(231,166,174,0.55);
    border:1px solid rgba(231,166,174,0.8);
    transform:rotate(-4deg);
    z-index:2;
  }

  .card .illus{
    width:100%;
    height:190px;
    display:flex;
    align-items:center;
    justify-content:center;
    background:linear-gradient(160deg, #f3ece0, #eee3d1);
    overflow:hidden;
  }
  .card .illus svg{width:80%;height:80%;}
  .card .illus img{width:100%;height:100%;object-fit:cover;display:block;}

  .card-body{padding:18px 22px 0;}

  .card .tag{
    font-family:'Caveat', cursive;
    font-weight:700;
    color:var(--sage);
    font-size:1.15rem;
    display:block;
    margin-bottom:2px;
  }

  .card h2{
    font-family:'Fraunces', serif;
    font-weight:600;
    font-size:1.6rem;
    margin:0 0 6px;
    color:var(--plum-dark);
  }

  .card p.desc{
    margin:0;
    font-size:0.95rem;
    color:var(--ink);
    opacity:0.75;
  }

  .card .heart{
    position:absolute;
    top:14px;
    right:16px;
    width:22px;
    height:22px;
    fill:var(--blush);
    z-index:2;
  }

  .recipe-view{display:none;}
  .recipe-view.active{display:block;}
  .home-view.hidden{display:none;}

  .back-link{
    font-family:'Caveat', cursive;
    font-weight:700;
    font-size:1.3rem;
    color:var(--plum);
    background:none;
    border:none;
    cursor:pointer;
    padding:0;
    margin-bottom:22px;
    display:inline-flex;
    align-items:center;
    gap:6px;
  }
  .back-link:hover{color:var(--blush);}
  .back-link:focus-visible{outline:3px solid var(--sage); outline-offset:4px;}

  .recipe-header{
    display:flex;
    gap:24px;
    align-items:center;
    margin-bottom:30px;
    flex-wrap:wrap;
  }
  .recipe-header .illus-lg{
    flex:0 0 150px;
    height:150px;
    background:linear-gradient(160deg, #f3ece0, #eee3d1);
    border-radius:8px;
    display:flex;
    align-items:center;
    justify-content:center;
    box-shadow:var(--shadow);
    overflow:hidden;
  }
  .recipe-header .illus-lg svg{width:82%;height:82%;}
  .recipe-header .illus-lg img{width:100%;height:100%;object-fit:cover;display:block;border-radius:8px;}

  .recipe-header .tag{
    font-family:'Caveat', cursive;
    font-weight:700;
    color:var(--sage);
    font-size:1.2rem;
    display:block;
  }

  .recipe-header h1{
    font-family:'Fraunces', serif;
    font-style:italic;
    font-weight:600;
    color:var(--plum-dark);
    font-size:clamp(1.9rem, 4vw, 2.6rem);
    margin:2px 0 0;
    line-height:1.1;
  }

  .recipe-columns{
    display:grid;
    grid-template-columns: 1fr 1.4fr;
    gap:40px;
  }
  @media (max-width:680px){
    .recipe-columns{grid-template-columns:1fr;}
    .notebook{padding:36px 20px 70px 56px;}
    .spiral{width:40px; gap:20px; padding-top:56px;}
    .spiral span{width:18px;height:18px;border-width:4px;}
  }

  .panel h3{
    font-family:'Fraunces', serif;
    font-weight:600;
    color:var(--plum);
    font-size:1.15rem;
    margin:0 0 14px;
    padding-bottom:8px;
    border-bottom:2px dashed var(--blush);
  }

  ul.ingredients{
    list-style:none;
    margin:0;
    padding:0;
  }
  ul.ingredients li{
    position:relative;
    padding-left:28px;
    margin-bottom:12px;
    font-size:0.98rem;
  }
  ul.ingredients li::before{
    content:"\2726";
    position:absolute;
    left:0;
    top:-1px;
    font-size:1rem;
    color:var(--saffron);
    text-shadow: 0 0 6px rgba(227,167,60,0.5);
  }

  ol.steps{
    margin:0;
    padding:0;
    list-style:none;
    counter-reset:step;
  }
  ol.steps li{
    counter-increment:step;
    position:relative;
    padding-left:44px;
    margin-bottom:22px;
    font-size:1rem;
  }
  ol.steps li::before{
    content:counter(step);
    position:absolute;
    left:0;
    top:-2px;
    width:30px;
    height:30px;
    border-radius:50%;
    background:var(--plum);
    color:#fbf6ee;
    font-family:'Caveat', cursive;
    font-weight:700;
    font-size:1.15rem;
    display:flex;
    align-items:center;
    justify-content:center;
  }

  .about{
    margin-top:56px;
    border-top:2px dashed var(--blush);
    padding-top:24px;
  }
  .about-toggle{
    width:100%;
    text-align:left;
    background:none;
    border:none;
    cursor:pointer;
    display:flex;
    align-items:center;
    justify-content:space-between;
    gap:12px;
    padding:0;
    font-family:'Fraunces', serif;
    font-style:italic;
    font-weight:600;
    font-size:1.3rem;
    color:var(--plum-dark);
  }
  .about-toggle:focus-visible{outline:3px solid var(--sage); outline-offset:4px;}
  .about-toggle .chevron{
    font-family:'Caveat', cursive;
    font-size:1.6rem;
    color:var(--sage);
    transition:transform 0.25s ease;
  }
  .about-toggle[aria-expanded="true"] .chevron{transform:rotate(180deg);}

  .about-panel{
    max-height:0;
    overflow:hidden;
    transition:max-height 0.35s ease;
  }
  .about-panel.open{max-height:300px;}

  .about-content{
    padding-top:20px;
    display:grid;
    gap:14px;
  }
  .about-line{
    font-size:1.05rem;
  }
  .about-line .role{
    font-family:'Caveat', cursive;
    font-weight:700;
    color:var(--sage);
    font-size:1.2rem;
    display:block;
  }
  .about-line .who{
    font-family:'Fraunces', serif;
    font-weight:600;
    color:var(--plum-dark);
    font-size:1.2rem;
  }
  .about-line .emoji{font-size:1.2rem;}

  footer{
    margin-top:40px;
    text-align:left;
    font-family:'Caveat', cursive;
    font-size:1.2rem;
    color:var(--plum);
    opacity:0.8;
  }

  @media (prefers-reduced-motion: reduce){
    .card, .card:hover{transition:none; transform:none;}
    html{scroll-behavior:auto;}
  }
</style>
</head>
<body>

<div class="notebook">
  <div class="spiral" aria-hidden="true">
    <span></span><span></span><span></span><span></span><span></span>
    <span></span><span></span><span></span><span></span><span></span>
  </div>

  <header class="masthead">
    <div class="brand">
      <img class="logo-mark" src="images/logo.png" alt="Me & The Kitchen logo">
      <h1 class="site-title">Me &amp; The Kitchen</h1>
    </div>
    <p class="tagline">My favorite place to be.</p>
  </header>

  <main class="home-view" id="home-view">
    <div class="cards" id="card-grid"></div>
  </main>

  <div id="recipe-container"></div>

  <section class="about">
    <button class="about-toggle" id="about-toggle" aria-expanded="false" aria-controls="about-panel">
      About this kitchen
      <span class="chevron">&#8964;</span>
    </button>
    <div class="about-panel" id="about-panel">
      <div class="about-content">
        <p class="about-line">
          <span class="role">Recipe maker</span>
          <span class="who">P Rohini</span> <span class="emoji">&#128081;&#128104;&zwj;&#127859;</span>
        </p>
        <p class="about-line">
          <span class="role">Developed by</span>
          <span class="who">Ch Sampath</span> <span class="emoji">🤴&#128187;</span>
        </p>
      </div>
    </div>
  </section>

  <footer>made with ♥ in the kitchen</footer>
</div>

<script>
  const recipes = [
    {
      id: "thotakura-pachadi",
      tag: "Andhra-style chutney",
      title: "Thotakura Pachadi",
      desc: "Amaranth leaves ground into a garlicky, tangy chutney.",
      image: "images/thotakura-pachadi.jpg",
      ingredients: [
        "Amaranthus leaves (thotakura) &ndash; 1 bunch (about &#8377;20 worth)",
        "Cumin seeds (jeera) &ndash; &frac12; tsp",
        "Fennel seeds (sounf) &ndash; &frac12; tsp",
        "Garlic cloves &ndash; 3",
        "Tamarind &ndash; a small piece",
        "Salt &amp; chilli powder &ndash; 1 tsp",
        "Onion &ndash; 1",
        "Tomatoes &ndash; 2",
        "Oil &ndash; 10 ml"
      ],
      steps: [
        "Heat 10 ml oil in a pan.",
        "Add all the ingredients &mdash; garlic, onion, tomatoes, cumin, fennel, tamarind, chilli powder, salt and the amaranthus leaves &mdash; and fry until everything softens.",
        "Let it cool slightly, then grind it all into a coarse chutney."
      ]
    },
    {
      id: "crispy-soy-garlic-chicken",
      tag: "Air-fryer favorite",
      title: "Crispy Soy Garlic Chicken",
      desc: "Air-fried chicken chunks tossed in a sticky soy-garlic sauce.",
      image: "images/crispy-soy-garlic-chicken.jpg",
      ingredients: [
        "Chicken chunks",
        "Cornstarch &ndash; for coating",
        "Salt &amp; pepper",
        "Garlic powder",
        "Soy sauce",
        "Ginger paste",
        "Garlic paste",
        "Brown sugar"
      ],
      steps: [
        "Combine chicken chunks with cornstarch, salt, garlic powder and pepper powder; mix well until evenly coated.",
        "Air-fry at 375&deg;F for 20 minutes, until golden and crispy.",
        "In a pan, add soy sauce, ginger paste, garlic paste and brown sugar; combine and simmer until the sauce thickens.",
        "Toss the crispy chicken in the sauce, mix well, and enjoy!"
      ]
    }
  ];

  const cardGrid = document.getElementById('card-grid');
  const recipeContainer = document.getElementById('recipe-container');
  const homeView = document.getElementById('home-view');
  const heartSvg = `<svg class="heart" viewBox="0 0 24 24"><path d="M12 21s-7.5-4.6-10-9.3C.4 8.1 2 4.5 5.4 4a5 5 0 0 1 6.6 2.1A5 5 0 0 1 18.6 4C22 4.5 23.6 8.1 22 11.7 19.5 16.4 12 21 12 21z"/></svg>`;

  recipes.forEach(r => {
    const card = document.createElement('button');
    card.className = 'card';
    card.setAttribute('aria-label', `Open recipe: ${r.title}`);
    card.innerHTML = `
      <div class="tape"></div>
      ${heartSvg}
      <div class="illus"><img src="${r.image}" alt="${r.title}" loading="lazy"></div>
      <div class="card-body">
        <span class="tag">${r.tag}</span>
        <h2>${r.title}</h2>
        <p class="desc">${r.desc}</p>
      </div>
    `;
    card.addEventListener('click', () => showRecipe(r.id));
    cardGrid.appendChild(card);

    const view = document.createElement('section');
    view.className = 'recipe-view';
    view.id = `view-${r.id}`;
    view.innerHTML = `
      <button class="back-link">&larr; back to the kitchen</button>
      <div class="recipe-header">
        <div class="illus-lg"><img src="${r.image}" alt="${r.title}" loading="lazy"></div>
        <div>
          <span class="tag">${r.tag}</span>
          <h1>${r.title}</h1>
        </div>
      </div>
      <div class="recipe-columns">
        <div class="panel">
          <h3>Ingredients</h3>
          <ul class="ingredients">
            ${r.ingredients.map(i => `<li>${i}</li>`).join('')}
          </ul>
        </div>
        <div class="panel">
          <h3>Method</h3>
          <ol class="steps">
            ${r.steps.map(s => `<li>${s}</li>`).join('')}
          </ol>
        </div>
      </div>
    `;
    view.querySelector('.back-link').addEventListener('click', showHome);
    recipeContainer.appendChild(view);
  });

  function showRecipe(id){
    homeView.classList.add('hidden');
    document.querySelectorAll('.recipe-view').forEach(v => v.classList.remove('active'));
    document.getElementById(`view-${id}`).classList.add('active');
    window.scrollTo({top:0, behavior:'smooth'});
    history.replaceState(null, '', `#${id}`);
  }
  function showHome(){
    document.querySelectorAll('.recipe-view').forEach(v => v.classList.remove('active'));
    homeView.classList.remove('hidden');
    window.scrollTo({top:0, behavior:'smooth'});
    history.replaceState(null, '', location.pathname);
  }

  const initial = location.hash.replace('#','');
  if (recipes.some(r => r.id === initial)) showRecipe(initial);

  const aboutToggle = document.getElementById('about-toggle');
  const aboutPanel = document.getElementById('about-panel');
  aboutToggle.addEventListener('click', () => {
    const expanded = aboutToggle.getAttribute('aria-expanded') === 'true';
    aboutToggle.setAttribute('aria-expanded', String(!expanded));
    aboutPanel.classList.toggle('open');
  });
</script>

</body>
</html>
